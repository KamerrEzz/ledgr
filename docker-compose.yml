services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ledgr
      POSTGRES_USER: ledgr
      POSTGRES_PASSWORD: ledgr_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgr -d ledgr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ledgr-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
